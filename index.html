// ── JSONBin storage ───────────────────────────────────────────────────────────
const configured = () => true;

async function remoteLoad() {
  if (!configured()) return null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
      headers: { "X-Master-Key": JSONBIN_API_KEY },
    });
    if (!r.ok) return null;
    const j = await r.json();
    return j.record || null;
  } catch { return null; }
}

async function remoteSave(data) {
  if (!configured()) return false;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_API_KEY },
      body: JSON.stringify(data),
    });
    return r.ok;
  } catch { return false; }
}

// ── Export ────────────────────────────────────────────────────────────────────
// ── Build column-per-staff data structure ─────────────────────────────────────
function buildStaffColumns(staffRows) {
  // Sort staff: those with projects first (by highest priority), then available
  return [...staffRows].sort((a,b)=>{
    const aMin = a.myProjects.length ? Math.min(...a.myProjects.map(p=>PRIORITY_ORDER[p.priority])) : 99;
    const bMin = b.myProjects.length ? Math.min(...b.myProjects.map(p=>PRIORITY_ORDER[p.priority])) : 99;
    return aMin - bMin;
  });
}
 
function exportExcel(staffRows) {
  const XLSX = window.XLSX;
  if (!XLSX) { alert("Excel library loading, please try again."); return; }
 
  const cols = buildStaffColumns(staffRows);
  const wb = XLSX.utils.book_new();
  const ws = {};
  const pc = { High:"#C00000", Medium:"#ED7D31", Low:"#70AD47", "On-Hold":"#A5A5A5" };
 
  // Row 1: date header spanning all columns
  const date = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const totalCols = cols.length * 5; // 5 cols per staff member
  ws["A1"] = { v:`Staffing Meeting — ${date}`, t:"s" };
  ws["!merges"] = [{ s:{r:0,c:0}, e:{r:0,c:totalCols-1} }];
 
  // Row 2: staff name headers, one block of 5 cols per person
  const fieldLabels = ["Project","Role","Hrs/Wk","Priority","Status"];
  cols.forEach((s, si) => {
    const baseCol = si * 5;
    // Staff name header spanning 5 cols
    const nameCell = XLSX.utils.encode_cell({r:1, c:baseCol});
    ws[nameCell] = { v:s.name, t:"s" };
    ws["!merges"].push({ s:{r:1,c:baseCol}, e:{r:1,c:baseCol+4} });
    // Field sub-headers
    fieldLabels.forEach((lbl, fi) => {
      const ref = XLSX.utils.encode_cell({r:2, c:baseCol+fi});
      ws[ref] = { v:lbl, t:"s" };
    });
    // Project rows
    if (!s.myProjects.length) {
      ws[XLSX.utils.encode_cell({r:3, c:baseCol})] = { v:"Available — no active projects", t:"s" };
    } else {
      s.myProjects.forEach((p, pi) => {
        const a = p.assignment;
        const row = 3 + pi;
        const vals = [p.name, a.role||"—", a.hours, p.priority, p.status];
        vals.forEach((v, fi) => {
          ws[XLSX.utils.encode_cell({r:row, c:baseCol+fi})] = { v: v===undefined?"":v, t: typeof v==="number"?"n":"s" };
        });
      });
    }
  });
 
  // Set worksheet dimensions
  const maxRows = Math.max(...cols.map(s=>s.myProjects.length||1)) + 3;
  ws["!ref"] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:maxRows, c:totalCols-1}});
  // Column widths: cycle 5 widths per staff block
  ws["!cols"] = Array.from({length:totalCols}, (_,i) => {
    const fi = i % 5;
    return { wch: [24,14,8,10,11][fi] };
  });
 
  XLSX.utils.book_append_sheet(wb, ws, "Staffing Meeting");
  XLSX.writeFile(wb, `staffing-${new Date().toISOString().slice(0,10)}.xlsx`);
}
 
function exportPDF(staffRows) {
  const cols = buildStaffColumns(staffRows);
  const date = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const pc = { High:"#dc2626", Medium:"#d97706", Low:"#16a34a", "On-Hold":"#94a3b8" };
  const sc = { Active:"#0284c7", "On Hold":"#d97706", Complete:"#16a34a", Planning:"#7c3aed" };
 
  // Find max number of projects any staff member has
  const maxProjects = Math.max(...cols.map(s=>s.myProjects.length), 1);
 
  // Build table: one column per staff member
  const headerCells = cols.map(s=>`
    <th style="background:#1e2740;color:#fff;padding:9px 10px;text-align:left;font-size:11px;font-weight:700;min-width:160px;border-right:2px solid #fff;">
      ${s.name}
    </th>`).join("");
 
  // Build rows: one row per project slot
  const bodyRows = Array.from({length:maxProjects}, (_,pi)=>{
    const cells = cols.map(s=>{
      const p = s.myProjects[pi];
      if (!p) return `<td style="padding:7px 10px;border-bottom:1px solid #e2e8f0;border-right:1px solid #e2e8f0;vertical-align:top;background:#fafafa;"></td>`;
      const a = p.assignment;
      const priColor = pc[p.priority]||"#64748b";
      const staColor = sc[p.status]||"#64748b";
      return `<td style="padding:7px 10px;border-bottom:1px solid #e2e8f0;border-right:1px solid #e2e8f0;vertical-align:top;">
        <div style="font-weight:700;font-size:11px;color:#0f172a;margin-bottom:3px;border-left:3px solid ${priColor};padding-left:6px;">${p.name}</div>
        ${p.client?`<div style="font-size:10px;color:#64748b;margin-bottom:3px;">${p.client}${p.projectId?` · ${p.projectId}`:""}</div>`:""}
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px;">
          ${a.role?`<span style="font-size:9px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:1px 5px;color:#475569;">${a.role}</span>`:""}
          ${a.hours?`<span style="font-size:9px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:1px 5px;color:#475569;">${a.hours}h/wk</span>`:""}
          <span style="font-size:9px;border-radius:4px;padding:1px 6px;font-weight:700;background:${priColor}18;color:${priColor};border:1px solid ${priColor}44;">${p.priority}</span>
          <span style="font-size:9px;border-radius:4px;padding:1px 6px;font-weight:700;background:${staColor}18;color:${staColor};border:1px solid ${staColor}44;">${p.status}</span>
        </div>
        ${(a.tasks||[]).length?`<div style="font-size:9px;color:#64748b;margin-bottom:2px;">${(a.tasks||[]).join(", ")}</div>`:""}
        ${a.notes?`<div style="font-size:9px;color:#6366f1;font-style:italic;">${a.notes}</div>`:""}
      </td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("");
 
  // Available staff row at bottom if any
  const available = cols.filter(s=>!s.myProjects.length).map(s=>s.name).join(", ");
  const availRow = available ? `<tr><td colspan="${cols.length}" style="padding:8px 10px;font-size:10px;color:#94a3b8;font-style:italic;border-top:2px solid #e2e8f0;">Available (no active projects): ${available}</td></tr>` : "";
 
  const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Staffing Meeting — ${date}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;font-size:12px;color:#1e293b;padding:24px}
    .hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #1e2740}
    h1{font-size:18px;font-weight:800;color:#0f172a}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    @page{margin:1cm;size:landscape}
    @media print{body{padding:0}}
  </style>
  </head><body>
  <div class="hdr">
    <div><h1>Staffing Meeting</h1><div style="font-size:10px;color:#64748b;margin-top:2px">Generated ${date}</div></div>
    <div style="font-size:10px;color:#94a3b8">${cols.length} staff · ${cols.reduce((n,s)=>n+s.myProjects.length,0)} assignments</div>
  </div>
  <table>
    <thead><tr>${headerCells}</tr></thead>
    <tbody>${bodyRows}${availRow}</tbody>
  </table>
  <script>window.onload=()=>{window.focus();window.print()}<\/script>
  </body></html>`;
 
  const w = window.open("","_blank","width=1400,height=900");
  if (w) { w.document.write(html); w.document.close(); }
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [staff,    setStaff]    = useState([]);
  const [projects, setProjects] = useState([]);
  const [loadStatus, setLoadStatus] = useState("loading");
  const [saveStatus, setSaveStatus] = useState("idle");
  const [theme, setTheme] = useState(() => localStorage.getItem("staffflow-theme") || "dark");
  const toggleTheme = () => setTheme(t => { const n = t==="dark"?"light":"dark"; localStorage.setItem("staffflow-theme",n); return n; });
  const [view,         setView]         = useState("staff");
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterStaffId,setFilterStaffId]= useState("All");
  const [sortProj,     setSortProj]     = useState("priority");
  const [search,       setSearch]       = useState("");
  const [modal,        setModal]        = useState(null);
  const saveTimer   = useRef(null);
  const initialized = useRef(false);

  // Load on mount
  useEffect(() => {
    async function load() {
      let data = await remoteLoad();
      if (!data) {
        // Fall back to localStorage
        try { const s = localStorage.getItem("staffflow-data"); if (s) data = JSON.parse(s); } catch {}
      }
      const d = data || DEFAULT_DATA;
      setStaff(d.staff || DEFAULT_DATA.staff);
      setProjects(d.projects || DEFAULT_DATA.projects);
      setLoadStatus("ready");
    }
    load();
  }, []);

  // Auto-save on change
  useEffect(() => {
    if (loadStatus !== "ready") return;
    if (!initialized.current) { initialized.current = true; return; }
    setSaveStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const payload = { staff, projects };
      // Always save to localStorage as backup
      try { localStorage.setItem("staffflow-data", JSON.stringify(payload)); } catch {}
      // Save to remote if configured
      if (configured()) {
        const ok = await remoteSave(payload);
        setSaveStatus(ok ? "saved" : "error");
      } else {
        setSaveStatus("saved");
      }
      setTimeout(() => setSaveStatus("idle"), 2500);
    }, 800);
  }, [staff, projects, loadStatus]);

  const filteredProjects = useMemo(() => {
    let list = [...projects];
    if (filterStatus !== "All")   list = list.filter(p=>p.status===filterStatus);
    if (filterStaffId !== "All")  list = list.filter(p=>p.assignments.some(a=>a.staffId===filterStaffId));
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p=>p.name.toLowerCase().includes(q)||p.client.toLowerCase().includes(q)||(p.projectId||"").toLowerCase().includes(q));
    }
    list.sort((a,b)=>{
      if (sortProj==="priority") return PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority];
      if (sortProj==="name")     return a.name.localeCompare(b.name);
      return a.status.localeCompare(b.status);
    });
    return list;
  }, [projects,filterStatus,filterStaffId,sortProj,search]);

  const staffRows = useMemo(()=>
    staff.map(s=>({
      ...s,
      myProjects: projects
        .filter(p=>p.assignments.some(a=>a.staffId===s.id))
        .filter(p=>filterStatus==="All"||p.status===filterStatus)
        .sort((a,b)=>PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority])
        .map(p=>({...p, assignment:p.assignments.find(a=>a.staffId===s.id)})),
    })),[staff,projects,filterStatus]);

  function saveProject(data) {
    setProjects(ps=>data.id?ps.map(p=>p.id===data.id?data:p):[...ps,{...data,id:uid()}]);
    setModal(null);
  }
  function deleteProject(id) {
    if (confirm("Delete this project?")) { setProjects(ps=>ps.filter(p=>p.id!==id)); setModal(null); }
  }
  function saveStaffMember(data) {
    setStaff(ss=>data.id?ss.map(s=>s.id===data.id?data:s):[...ss,{...data,id:uid()}]);
    setModal(null);
  }
  function deleteStaffMember(id) {
    if (confirm("Remove this staff member?")) {
      setStaff(ss=>ss.filter(s=>s.id!==id));
      setProjects(ps=>ps.map(p=>({...p,assignments:p.assignments.filter(a=>a.staffId!==id)})));
      setModal(null);
    }
  }

  if (loadStatus==="loading") return (
    <div className={`theme-${theme}`} style={{ minHeight:"100vh", background:"var(--bg-base)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:14 }}>
      <div style={{ fontSize:36, animation:"spin 1.5s linear infinite", display:"inline-block", color:"var(--accent)" }}>⬡</div>
      <div style={{ color:"var(--text-muted)", fontSize:14 }}>Loading Design Staff Tracker…</div>
    </div>
  );

  const saveInd = { saving:{color:"#f59e0b",text:"⟳ Saving…"}, saved:{color:"#22c55e",text:"✓ Saved"}, error:{color:"#f43f5e",text:"✕ Save failed"} }[saveStatus];

  return (
    <div className={`theme-${theme}`} style={{ minHeight:"100vh", background:"var(--bg-base)", color:"var(--text-body)" }}>

      {/* Sidebar */}
      <div style={{ position:"fixed", left:0, top:0, bottom:0, width:216,
        background:"var(--bg-sidebar)", borderRight:"1px solid var(--border)",
        display:"flex", flexDirection:"column", zIndex:100, boxShadow:"var(--shadow)" }}>
        <div style={{ padding:"20px 18px 16px", borderBottom:"1px solid var(--border)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:9 }}>
            <div style={{ width:28, height:28, borderRadius:7, background:"var(--logo-grad)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, color:"#fff" }}>⬡</div>
            <span style={{ fontFamily:"'DM Serif Display',serif", fontSize:17, color:"var(--text-primary)" }}>Design Staff Tracker</span>
          </div>
        </div>

        <nav style={{ padding:"12px 8px", flex:1, overflowY:"auto" }}>
          <div style={{ ...labelSt, padding:"0 8px 6px" }}>Views</div>
          {[["staff","◈","By Staff"],["projects","◉","By Project"],["meeting","⊞","Meeting View"]].map(([key,icon,label])=>(
            <button key={key} onClick={()=>setView(key)} style={{ width:"100%", display:"flex", alignItems:"center", gap:8, padding:"8px 10px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", background:view===key?"var(--accent-bg)":"none", border:view===key?"1px solid var(--accent-border)":"1px solid transparent", color:view===key?"var(--accent)":"var(--text-muted)", fontSize:13, fontWeight:view===key?700:500, marginBottom:2, textAlign:"left" }}>
              <span style={{ fontSize:14 }}>{icon}</span>{label}
            </button>
          ))}
          <div style={{ ...labelSt, padding:"16px 8px 6px" }}>Team</div>
          {staff.map(s=>(
            <button key={s.id} onClick={()=>{setView("staff");setFilterStaffId(s.id);}} style={{ width:"100%", display:"flex", alignItems:"center", gap:7, padding:"6px 8px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", background:filterStaffId===s.id?"var(--accent-bg)":"none", border:"1px solid transparent", color:filterStaffId===s.id?"var(--text-primary)":"var(--text-muted)", fontSize:12, marginBottom:1, textAlign:"left" }}>
              <Avatar name={s.name} size={20}/>
              <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.name}</span>
            </button>
          ))}
        </nav>

        <div style={{ padding:"10px 8px", borderTop:"1px solid var(--border)", display:"flex", flexDirection:"column", gap:6 }}>
          <button onClick={()=>setModal({type:"editProject",data:{}})} style={{ background:"var(--logo-grad)", border:"none", color:"#fff", borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit", textAlign:"left" }}>+ New Project</button>
          <button onClick={()=>setModal({type:"editStaff",data:{}})} style={{ background:"var(--btn-add-bg)", border:"1px solid var(--btn-add-border)", color:"var(--btn-add-color)", borderRadius:8, padding:"7px 12px", cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"inherit", textAlign:"left" }}>+ Add Staff</button>
        </div>
      </div>

      {/* Main */}
      <div style={{ marginLeft:216, padding:"0 28px 48px" }}>
        {/* Topbar */}
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"16px 0", borderBottom:"1px solid var(--border)", position:"sticky", top:0, background:"var(--bg-topbar)", zIndex:50 }}>
          <h1 style={{ margin:0, fontFamily:"'DM Serif Display',serif", fontSize:20, color:"var(--text-primary)", flex:1 }}>
            {view==="staff"?"Staff Overview":view==="projects"?"All Projects":"Staffing Meeting"}
          </h1>
          {saveInd && <span style={{ fontSize:12, color:saveInd.color, fontWeight:600 }}>{saveInd.text}</span>}
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            {view==="projects" && <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{ ...inputSt, width:160, height:34 }}/>}
            {view!=="meeting" && <FilterSel value={filterStatus} onChange={setFilterStatus} options={[{value:"All",label:"All Statuses"},...STATUSES.map(s=>({value:s,label:s}))]}/>}
            {view==="projects" && <>
              <FilterSel value={filterStaffId} onChange={setFilterStaffId} options={[{value:"All",label:"All Staff"},...staff.map(s=>({value:s.id,label:s.name}))]}/>
              <FilterSel value={sortProj} onChange={setSortProj} options={[{value:"priority",label:"↑ Priority"},{value:"name",label:"A–Z"},{value:"status",label:"Status"}]}/>
            </>}
            {view==="staff" && filterStaffId!=="All" && (
              <button onClick={()=>setFilterStaffId("All")} style={{ background:"var(--accent-bg)", border:"1px solid var(--accent-border)", color:"var(--accent)", borderRadius:7, padding:"5px 10px", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
                {staff.find(s=>s.id===filterStaffId)?.name} ✕
              </button>
            )}
            {view==="meeting" && (
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={()=>exportExcel(staffRows)} style={{ background:"#16532218", border:"1px solid #16532240", color:"#22c55e", borderRadius:8, padding:"7px 13px", cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit" }}>⬇ Excel</button>
                <button onClick={()=>exportPDF(staffRows)} style={{ background:"#7c3aed18", border:"1px solid #7c3aed40", color:"#a78bfa", borderRadius:8, padding:"7px 13px", cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit" }}>🖨 Print / PDF</button>
              </div>
            )}
            <button onClick={toggleTheme} title={theme==="dark"?"Switch to light mode":"Switch to dark mode"} style={{ background:"var(--btn-add-bg)", border:"1px solid var(--border-input)", color:"var(--text-muted)", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:16, lineHeight:1, display:"flex", alignItems:"center" }}>{theme==="dark"?"☀️":"🌙"}</button>
          </div>
        </div>

        <div style={{ paddingTop:20 }}>
          {!configured() && <SetupBanner/>}

          {view==="staff" && staffRows.filter(s=>filterStaffId==="All"||s.id===filterStaffId).map(s=>(
            <StaffCard key={s.id} s={s} onEditProject={p=>setModal({type:"editProject",data:p})} onEditStaff={()=>setModal({type:"editStaff",data:s})}/>
          ))}

          {view==="projects" && (
            <div style={{ display:"grid", gap:14, gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))" }}>
              {filteredProjects.map(p=><ProjectCard key={p.id} p={p} staff={staff} onClick={()=>setModal({type:"editProject",data:p})}/>)}
              {!filteredProjects.length && <div style={{ gridColumn:"1/-1", textAlign:"center", color:"#334155", padding:"80px 0" }}>No projects match your filters.</div>}
            </div>
          )}

          {view==="meeting" && <MeetingView staffRows={staffRows} projects={projects} staff={staff}/>}
        </div>
      </div>

      {modal?.type==="editProject" && <ProjectModal project={modal.data} staff={staff} onSave={saveProject} onDelete={deleteProject} onClose={()=>setModal(null)}/>}
      {modal?.type==="editStaff"   && <StaffModal   member={modal.data}                onSave={saveStaffMember} onDelete={deleteStaffMember} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ── StaffCard ─────────────────────────────────────────────────────────────────
function StaffCard({ s, onEditProject, onEditStaff }) {
  const totalHrs = s.myProjects.reduce((sum,p)=>sum+(p.assignment?.hours||0),0);
  return (
    <div style={{ background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:14, marginBottom:14, overflow:"hidden", boxShadow:"var(--shadow)" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 18px", background:"var(--bg-card-head)", borderBottom:"1px solid var(--border)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:11 }}>
          <Avatar name={s.name} size={38}/>
          <div>
            <div style={{ fontWeight:700, fontSize:15, color:"var(--text-primary)" }}>{s.name}</div>
            <div style={{ fontSize:12, color:"var(--text-subtle)", marginTop:1 }}>{s.myProjects.length} project{s.myProjects.length!==1?"s":""} · {totalHrs} hrs/wk</div>
          </div>
        </div>
        <button onClick={onEditStaff} style={{ background:"none", border:"1px solid var(--border)", color:"var(--text-subtle)", borderRadius:6, padding:"4px 10px", cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>Edit</button>
      </div>
      {!s.myProjects.length
        ? <div style={{ padding:18, fontSize:13, color:"var(--text-faint)", fontStyle:"italic" }}>No active projects — available for assignment</div>
        : <div style={{ padding:"12px 14px", display:"flex", flexDirection:"column", gap:10 }}>
          {s.myProjects.map(p=>{
            const a=p.assignment;
            return (
              <div key={p.id} onClick={()=>onEditProject(p)} style={{ background:"var(--bg-card-inner)", border:"1px solid var(--border)", borderLeft:`3px solid ${PRIORITY_COLOR[p.priority]}`, borderRadius:10, padding:"12px 14px", cursor:"pointer" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                  <div>
                    <div style={{ fontWeight:700, fontSize:13, color:"var(--text-body)" }}>{p.name}</div>
                    <div style={{ fontSize:11, color:"var(--text-subtle)", marginTop:2 }}>{p.projectId&&<span style={{ marginRight:6, color:"var(--text-faint)" }}>{p.projectId}</span>}{p.client}</div>
                  </div>
                  <div style={{ display:"flex", gap:5, flexShrink:0, flexWrap:"wrap", justifyContent:"flex-end" }}>
                    <PriorityPip priority={p.priority}/>
                    <Badge label={p.status} color={STATUS_COLOR[p.status]}/>
                  </div>
                </div>
                <div style={{ marginTop:9, display:"flex", gap:16, flexWrap:"wrap", fontSize:12, color:"var(--text-muted)" }}>
                  <span><strong style={{ color:"var(--text-subtle)" }}>Role:</strong> {a.role||"—"}</span>
                  <span><strong style={{ color:"var(--text-subtle)" }}>Hrs/wk:</strong> {a.hours}</span>
                  {p.location&&<span><strong style={{ color:"var(--text-subtle)" }}>Location:</strong> {p.location}</span>}
                </div>
                {a.tasks?.length>0 && <div style={{ marginTop:8, display:"flex", gap:4, flexWrap:"wrap" }}>{a.tasks.map((t,i)=><span key={i} style={{ fontSize:11, background:"var(--tag-bg)", border:"1px solid var(--tag-border)", borderRadius:5, padding:"2px 8px", color:"var(--tag-text)" }}>{t}</span>)}</div>}
                {a.notes && <div style={{ marginTop:9, padding:"7px 10px", background:"var(--accent-bg)", border:"1px solid var(--accent-border)", borderRadius:7, fontSize:12, color:"var(--accent)", fontStyle:"italic" }}>📝 {a.notes}</div>}
              </div>
            );
          })}
        </div>
      }
    </div>
  );
}

// ── ProjectCard ───────────────────────────────────────────────────────────────
function ProjectCard({ p, staff, onClick }) {
  return (
    <div onClick={onClick} style={{ background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:12, padding:18, cursor:"pointer", boxShadow:"var(--shadow)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
        <div>
          <div style={{ fontWeight:700, fontSize:15, fontFamily:"'DM Serif Display',serif", color:"var(--text-primary)", marginBottom:2 }}>{p.name}</div>
          <div style={{ fontSize:12, color:"var(--text-subtle)" }}>{p.projectId&&<span style={{ marginRight:8, color:"var(--text-faint)" }}>{p.projectId}</span>}{p.client}</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:5, alignItems:"flex-end" }}>
          <PriorityPip priority={p.priority}/>
          <Badge label={p.status} color={STATUS_COLOR[p.status]}/>
        </div>
      </div>
      {p.location&&<div style={{ fontSize:12, color:"var(--text-muted)", marginBottom:8 }}>📍 {p.location}</div>}
      <div style={{ borderTop:"1px solid var(--border)", paddingTop:10 }}>
        <div style={{ ...labelSt, marginBottom:8 }}>Team · {p.assignments.length}</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
          {p.assignments.map(a=>{const s=staff.find(st=>st.id===a.staffId);if(!s)return null;return(
            <div key={a.staffId} style={{ display:"flex", alignItems:"center", gap:6 }}>
              <Avatar name={s.name} size={24}/>
              <div>
                <div style={{ fontSize:12, fontWeight:600, color:"var(--text-body)" }}>{s.name}</div>
                <div style={{ fontSize:11, color:"var(--text-subtle)" }}>{a.role}{a.hours?` · ${a.hours}h`:""}</div>
              </div>
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

// ── MeetingView ───────────────────────────────────────────────────────────────
function MeetingView({ staffRows, projects, staff }) {
  const [groupBy, setGroupBy] = useState("staff");
  const thS = { textAlign:"left", padding:"9px 13px", fontSize:10, color:"var(--text-muted)", fontWeight:700, letterSpacing:".07em", textTransform:"uppercase", borderBottom:"1px solid var(--border)", background:"var(--th-bg)", whiteSpace:"nowrap" };
  const tdS = { padding:"10px 13px", fontSize:12, borderBottom:"1px solid var(--border)", verticalAlign:"top" };

  const staffTableRows = (() => {
    const sorted = [...staffRows].sort((a,b)=>Math.min(...a.myProjects.map(p=>PRIORITY_ORDER[p.priority]),99)-Math.min(...b.myProjects.map(p=>PRIORITY_ORDER[p.priority]),99));
    const rows = [];
    sorted.forEach(s=>{
      if(!s.myProjects.length){rows.push({kind:"empty-staff",staffName:s.name});return;}
      s.myProjects.forEach((p,pi)=>rows.push({kind:"staff-row",staffName:pi===0?s.name:null,project:p,rowSpan:pi===0?s.myProjects.length:0}));
    });
    return rows;
  })();

  const projectTableRows = (() => {
    const sorted = [...projects].sort((a,b)=>PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority]);
    const rows = [];
    sorted.forEach(p=>{
      if(!p.assignments.length){rows.push({kind:"empty-project",project:p});return;}
      p.assignments.forEach((a,ai)=>{
        const member=staff.find(s=>s.id===a.staffId);
        rows.push({kind:"project-row",showProject:ai===0,project:p,assignment:a,member,rowSpan:ai===0?p.assignments.length:0});
      });
    });
    return rows;
  })();

  function TabBtn({id,label}) {
    const active=groupBy===id;
    return <button onClick={()=>setGroupBy(id)} style={{ padding:"6px 18px", borderRadius:7, cursor:"pointer", fontSize:12, fontWeight:700, fontFamily:"inherit", background:active?"var(--accent-bg)":"none", border:active?"1px solid var(--accent-border)":"1px solid transparent", color:active?"var(--accent)":"var(--text-muted)" }}>{label}</button>;
  }

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <p style={{ fontSize:13, color:"var(--text-muted)", margin:0 }}>
          {groupBy==="staff" ? "Sorted by priority · staff with highest-priority projects listed first" : "Sorted by priority · one row per project with assigned staff listed underneath"}
        </p>
        <div style={{ display:"flex", background:"var(--bg-card-head)", border:"1px solid var(--border)", borderRadius:9, padding:3, gap:2 }}>
          <TabBtn id="staff"   label="◈ By Staff"   />
          <TabBtn id="project" label="◉ By Project" />
        </div>
      </div>

      <div style={{ overflowX:"auto", borderRadius:12, border:"1px solid var(--border)" }}>

        {groupBy==="staff" && (
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr>{["Staff","Project","ID","Client","Role","Hrs/Wk","Priority","Status","Location","Tasks","Notes"].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
            <tbody>
              {staffTableRows.map((row,i)=>{
                const bg=i%2===0?"var(--row-even)":"var(--row-odd)";
                if(row.kind==="empty-staff") return(
                  <tr key={i} style={{ background:bg }}>
                    <td style={tdS}><div style={{ display:"flex", alignItems:"center", gap:7 }}><Avatar name={row.staffName} size={24}/><span style={{ fontWeight:700, color:"var(--text-primary)" }}>{row.staffName}</span></div></td>
                    <td style={{ ...tdS, color:"var(--text-faint)", fontStyle:"italic" }} colSpan={10}>Available — no active projects</td>
                  </tr>
                );
                const p=row.project; const a=p.assignment;
                return(
                  <tr key={i} style={{ background:bg }}>
                    {row.staffName&&<td style={{ ...tdS, verticalAlign:"middle" }} rowSpan={row.rowSpan}><div style={{ display:"flex", alignItems:"center", gap:7 }}><Avatar name={row.staffName} size={24}/><span style={{ fontWeight:700, color:"var(--text-primary)", fontSize:13 }}>{row.staffName}</span></div></td>}
                    <td style={{ ...tdS, fontWeight:600, color:"var(--text-primary)", borderLeft:`3px solid ${PRIORITY_COLOR[p.priority]}` }}>{p.name}</td>
                    <td style={{ ...tdS, color:"var(--text-faint)" }}>{p.projectId}</td>
                    <td style={{ ...tdS, color:"var(--text-muted)" }}>{p.client}</td>
                    <td style={{ ...tdS, color:"var(--text-subtle)" }}>{a.role||"—"}</td>
                    <td style={{ ...tdS, textAlign:"center", fontWeight:600 }}>{a.hours}</td>
                    <td style={tdS}><PriorityPip priority={p.priority}/></td>
                    <td style={tdS}><Badge label={p.status} color={STATUS_COLOR[p.status]}/></td>
                    <td style={{ ...tdS, color:"var(--text-muted)" }}>{p.location||""}</td>
                    <td style={tdS}><div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>{(a.tasks||[]).map((t,ti)=><span key={ti} style={{ fontSize:10, background:"var(--tag-bg)", border:"1px solid var(--tag-border)", borderRadius:4, padding:"1px 6px", color:"var(--tag-text)" }}>{t}</span>)}</div></td>
                    <td style={{ ...tdS, color:"var(--accent)", fontSize:11, fontStyle:"italic", maxWidth:180 }}>{a.notes||""}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}

        {groupBy==="project" && (
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr>{["Project","ID","Client","Priority","Status","Staff Member","Role","Hrs/Wk","Tasks","Notes"].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
            <tbody>
              {projectTableRows.map((row,i)=>{
                const bg=i%2===0?"var(--row-even)":"var(--row-odd)";
                if(row.kind==="empty-project") return(
                  <tr key={i} style={{ background:bg }}>
                    <td style={{ ...tdS, fontWeight:600, color:"var(--text-primary)", borderLeft:`3px solid ${PRIORITY_COLOR[row.project.priority]}` }}>{row.project.name}</td>
                    <td style={{ ...tdS, color:"var(--text-faint)" }}>{row.project.projectId}</td>
                    <td style={{ ...tdS, color:"var(--text-muted)" }}>{row.project.client}</td>
                    <td style={tdS}><PriorityPip priority={row.project.priority}/></td>
                    <td style={tdS}><Badge label={row.project.status} color={STATUS_COLOR[row.project.status]}/></td>
                    <td style={{ ...tdS, color:"var(--text-faint)", fontStyle:"italic" }} colSpan={5}>No staff assigned</td>
                  </tr>
                );
                const {project:p, assignment:a, member} = row;
                return(
                  <tr key={i} style={{ background:bg }}>
                    {row.showProject&&<td style={{ ...tdS, fontWeight:600, color:"var(--text-primary)", verticalAlign:"middle", borderLeft:`3px solid ${PRIORITY_COLOR[p.priority]}` }} rowSpan={row.rowSpan}>{p.name}</td>}
                    {row.showProject&&<td style={{ ...tdS, color:"var(--text-faint)", verticalAlign:"middle" }} rowSpan={row.rowSpan}>{p.projectId}</td>}
                    {row.showProject&&<td style={{ ...tdS, color:"var(--text-muted)", verticalAlign:"middle" }} rowSpan={row.rowSpan}>{p.client}</td>}
                    {row.showProject&&<td style={{ ...tdS, verticalAlign:"middle" }} rowSpan={row.rowSpan}><PriorityPip priority={p.priority}/></td>}
                    {row.showProject&&<td style={{ ...tdS, verticalAlign:"middle" }} rowSpan={row.rowSpan}><Badge label={p.status} color={STATUS_COLOR[p.status]}/></td>}
                    <td style={tdS}>
                      {member
                        ? <div style={{ display:"flex", alignItems:"center", gap:7 }}><Avatar name={member.name} size={22}/><span style={{ fontWeight:600, color:"var(--text-body)" }}>{member.name}</span></div>
                        : <span style={{ color:"var(--text-faint)", fontStyle:"italic" }}>Unknown</span>}
                    </td>
                    <td style={{ ...tdS, color:"var(--text-subtle)" }}>{a.role||"—"}</td>
                    <td style={{ ...tdS, textAlign:"center", fontWeight:600 }}>{a.hours}</td>
                    <td style={tdS}><div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>{(a.tasks||[]).map((t,ti)=><span key={ti} style={{ fontSize:10, background:"var(--tag-bg)", border:"1px solid var(--tag-border)", borderRadius:4, padding:"1px 6px", color:"var(--tag-text)" }}>{t}</span>)}</div></td>
                    <td style={{ ...tdS, color:"var(--accent)", fontSize:11, fontStyle:"italic", maxWidth:180 }}>{a.notes||""}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}

      </div>
    </div>
  );
}
function TaskInput({ value, onChange }) {
  const [text, setText] = useState((value||[]).join(", "));
  useEffect(() => { setText((value||[]).join(", ")); }, [value.join(",")]);
  return (
    <input
      style={inputSt}
      value={text}
      placeholder="Task 1, Task 2, Task 3"
      onChange={e => setText(e.target.value)}
      onBlur={e => onChange(e.target.value.split(",").map(t=>t.trim()).filter(Boolean))}
    />
  );
}
// ── ProjectModal ──────────────────────────────────────────────────────────────
function ProjectModal({ project, staff, onSave, onDelete, onClose }) {
  const isNew = !project.id;
  const [form,setForm] = useState({ id:project.id||"", name:project.name||"", projectId:project.projectId||"", client:project.client||"", location:project.location||"", priority:project.priority||"Medium", status:project.status||"Active", assignments:project.assignments?JSON.parse(JSON.stringify(project.assignments)):[] });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  function setStatus(v){setForm(f=>({...f,status:v,priority:v==="On Hold"?"On-Hold":(f.priority==="On-Hold"?"Medium":f.priority)}));}
  function addAssignment(){
    const used=new Set(form.assignments.map(a=>a.staffId));
    const avail=staff.filter(s=>!used.has(s.id));
    if(!avail.length)return;
    setForm(f=>({...f,assignments:[...f.assignments,{staffId:avail[0].id,role:"",hours:0,tasks:[],notes:""}]}));
  }
  function updA(idx,k,v){setForm(f=>{const a=[...f.assignments];a[idx]={...a[idx],[k]:v};return{...f,assignments:a};});}
  return (
    <Modal title={isNew?"New Project":"Edit Project"} onClose={onClose} wide>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:4 }}>
        <div style={{ gridColumn:"1/-1" }}><Lbl t="Project Name"/><input style={inputSt} value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Project name"/></div>
        <div><Lbl t="Project ID"/><input style={inputSt} value={form.projectId} onChange={e=>set("projectId",e.target.value)} placeholder="PRJ-001"/></div>
        <div><Lbl t="Client / Department"/><input style={inputSt} value={form.client} onChange={e=>set("client",e.target.value)} placeholder="Client name"/></div>
        <div><Lbl t="Priority"/><select style={inputSt} value={form.priority} onChange={e=>set("priority",e.target.value)}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></div>
        <div><Lbl t="Status"/><select style={inputSt} value={form.status} onChange={e=>setStatus(e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
        <div style={{ gridColumn:"1/-1" }}><Lbl t="City / Site Location"/><input style={inputSt} value={form.location||""} onChange={e=>set("location",e.target.value)} placeholder="e.g. New York, Site B"/></div>
      </div>
      <div style={{ marginTop:18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
          <span style={labelSt}>Team Assignments</span>
          <button onClick={addAssignment} style={{ background:"var(--accent-bg)", border:"1px solid var(--accent-border)", color:"var(--accent)", borderRadius:6, padding:"4px 12px", cursor:"pointer", fontSize:11, fontFamily:"inherit", fontWeight:700 }}>+ Add Person</button>
        </div>
        {form.assignments.map((a,idx)=>(
          <div key={idx} style={{ background:"var(--bg-card-inner)", border:"1px solid var(--border)", borderRadius:10, padding:14, marginBottom:10 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 80px 34px", gap:10, marginBottom:10 }}>
              <div><Lbl t="Staff Member"/><select style={inputSt} value={a.staffId} onChange={e=>updA(idx,"staffId",e.target.value)}>{staff.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
              <div><Lbl t="Role"/><input style={inputSt} value={a.role} onChange={e=>updA(idx,"role",e.target.value)} placeholder="Lead, Designer…"/></div>
              <div><Lbl t="Hrs/Wk"/><input style={inputSt} type="number" value={a.hours} onChange={e=>updA(idx,"hours",+e.target.value)}/></div>
              <button onClick={()=>setForm(f=>({...f,assignments:f.assignments.filter((_,i)=>i!==idx)}))} style={{ background:"none", border:"1px solid #f43f5e22", color:"#f43f5e", borderRadius:6, cursor:"pointer", marginTop:20, fontSize:14 }}>✕</button>
            </div>
            <div style={{ marginBottom:10 }}><Lbl t="Tasks (comma-separated)"/><TaskInput value={a.tasks||[]} onChange={v=>updA(idx,"tasks",v)} /></div>
            <div><Lbl t="Notes"/><input style={inputSt} value={a.notes||""} onChange={e=>updA(idx,"notes",e.target.value)} placeholder="Staffing context, flags, anything worth noting…"/></div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:20 }}>
        {!isNew&&<Btn variant="danger" onClick={()=>onDelete(form.id)} style={{ marginRight:"auto" }}>Delete</Btn>}
        <Btn onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" onClick={()=>form.name.trim()&&onSave(form)}>Save Project</Btn>
      </div>
    </Modal>
  );
}

// ── StaffModal ────────────────────────────────────────────────────────────────
function StaffModal({ member, onSave, onDelete, onClose }) {
  const isNew = !member.id;
  const [name,setName] = useState(member.name||"");
  return (
    <Modal title={isNew?"Add Staff Member":"Edit Staff Member"} onClose={onClose}>
      <Lbl t="Full Name"/>
      <input style={inputSt} value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" autoFocus/>
      <div style={{ display:"flex", gap:10, justifyContent:"flex-end", marginTop:20 }}>
        {!isNew&&<Btn variant="danger" onClick={()=>onDelete(member.id)} style={{ marginRight:"auto" }}>Remove</Btn>}
        <Btn onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" onClick={()=>name.trim()&&onSave({id:member.id,name:name.trim()})}>Save</Btn>
      </div>
    </Modal>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
